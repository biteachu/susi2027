<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수시 지원현황 대시보드 (교사용)</title>
<style>
  :root{
    --blue:#2563eb; --bg:#f1f5f9; --card:#fff; --line:#e2e8f0;
    --text:#0f172a; --sub:#64748b; --green:#16a34a; --red:#dc2626; --amber:#d97706; --purple:#a21caf;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); padding:16px; max-width:1200px; margin:0 auto;}
  h1{font-size:1.3rem; margin:8px 0 14px;}
  h2{font-size:1.05rem; margin:18px 0 8px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px;}
  input,select{padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:.9rem; font-family:inherit;}
  button{cursor:pointer; border:none; border-radius:8px; padding:9px 14px; font-size:.9rem; font-family:inherit; background:var(--blue); color:#fff;}
  button.gray{background:#e2e8f0; color:var(--text);}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin:12px 0;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center;}
  .stat .num{font-size:1.4rem; font-weight:bold; color:var(--blue);}
  .stat .lbl{font-size:.75rem; color:var(--sub);}
  table{width:100%; border-collapse:collapse; font-size:.82rem; background:var(--card);}
  th,td{border:1px solid var(--line); padding:6px 8px; text-align:left;}
  th{background:#f8fafc; position:sticky; top:0; white-space:nowrap;}
  tr:hover td{background:#f8fafc;}
  .tbl-wrap{max-height:520px; overflow:auto; border-radius:10px; border:1px solid var(--line);}
  .tag{display:inline-block; font-size:.72rem; padding:1px 7px; border-radius:99px;}
  .t-교과{background:#eff6ff; color:#1d4ed8;}
  .t-종합{background:#fdf4ff; color:#a21caf;}
  .t-논술{background:#fff7ed; color:#c2410c;}
  .t-기타{background:#f1f5f9; color:#475569;}
  .t-예외{background:#f0fdfa; color:#0f766e;}
  .r-합격{color:var(--green); font-weight:bold;}
  .r-충원{color:var(--green);}
  .r-불합격{color:var(--red);}
  .warn{background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px 12px; font-size:.85rem; color:#92400e; margin:6px 0;}
  .msg{padding:10px; border-radius:8px; margin:8px 0; font-size:.9rem; display:none;}
  .msg.err{display:block; background:#fef2f2; color:var(--red); border:1px solid #fecaca;}
  .small{font-size:.78rem; color:var(--sub);}
  /* 캘린더 */
  .cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .cal-title{font-weight:bold; font-size:1.05rem;}
  .cal-nav{background:#e2e8f0; color:var(--text); padding:5px 14px;}
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
  .cal .dow{text-align:center; font-size:.75rem; color:var(--sub); padding:4px 0;}
  .cal .day{min-height:86px; background:#fff; border:1px solid var(--line); border-radius:6px; padding:3px; font-size:.72rem; overflow:hidden; cursor:pointer;}
  .cal .day.out{background:#f8fafc;}
  .cal .day.today{outline:2px solid var(--blue);}
  .cal .day.sel{outline:2px solid var(--amber);}
  .cal .dnum{font-size:.75rem; color:var(--sub);}
  .ev{border-radius:4px; padding:1px 4px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ev.면접{background:#dbeafe; color:#1d4ed8;}
  .ev.발표{background:#dcfce7; color:#15803d;}
  .ev.충원{background:#fef3c7; color:#b45309;}
  .more{font-size:.7rem; color:var(--sub); margin-top:1px;}
  .legend{font-size:.78rem; color:var(--sub); margin-top:8px;}
  .legend span{display:inline-block; padding:1px 8px; border-radius:4px; margin-right:6px;}
  #dayDetail li{margin:4px 0; font-size:.88rem;}
  .q-item{border-bottom:1px solid var(--line); padding:8px 2px;}
  /* 일정 팝업 */
  .modal-bg{display:none; position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:100; align-items:center; justify-content:center; padding:16px;}
  .modal-bg.open{display:flex;}
  .modal{background:#fff; border-radius:12px; padding:16px; max-width:640px; width:100%; max-height:80vh; overflow:auto; box-shadow:0 10px 40px rgba(0,0,0,.2);}
</style>
</head>
<body>
<h1>📊 수시 지원현황 대시보드 <span class="small">(교사용)</span></h1>

<div class="card">
  <div class="toolbar">
    <input id="tkey" type="password" placeholder="교사 키" style="width:160px;">
    <button onclick="load()">🔄 현황 불러오기</button>
    <button class="gray" onclick="exportCSV()">⬇ CSV 내보내기 (엑셀·대교협 정리용)</button>
  </div>
  <div id="msg" class="msg"></div>
</div>

<div class="stats" id="stats"></div>
<div id="warnings"></div>

<div class="card">
  <div class="toolbar">
    <select id="fClass" onchange="render()"><option value="">전체 반</option></select>
    <select id="fType" onchange="render()"><option value="">전체 전형구분</option><option>학생부교과</option><option>학생부종합</option><option>논술</option><option>실기/실적</option><option>기타</option></select>
    <select id="fLimit" onchange="render()"><option value="">6회제한 전체</option><option value="제한">제한 적용만</option><option value="예외">예외 지원만</option></select>
    <select id="fResult" onchange="render()"><option value="">전체 결과</option><option>합격</option><option>충원합격(추가합격)</option><option>충원대기(예비번호)</option><option>불합격</option><option value="__none__">결과 미입력</option></select>
    <input id="fSearch" placeholder="대학/학과/이름 검색" oninput="render()" style="flex:1; min-width:140px;">
  </div>
</div>

<h2>🗓 반 전체 일정 캘린더</h2>
<div class="card">
  <div class="cal-head">
    <button class="cal-nav" onclick="moveMonth(-1)">◀ 이전 달</button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-nav" onclick="moveMonth(1)">다음 달 ▶</button>
  </div>
  <div class="cal" id="cal"></div>
  <div class="legend">
    <span class="ev 면접">면접</span><span class="ev 발표">발표</span><span class="ev 충원">충원발표</span>
    &nbsp;날짜 칸에는 종류별 건수만 표시됩니다. 날짜를 클릭하면 상세 팝업이 뜹니다. (필터 적용됨)
  </div>
</div>

<div id="modalBg" class="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <b id="dayDetailTitle"></b>
      <button class="gray" onclick="closeModal()">✕ 닫기</button>
    </div>
    <ul id="dayDetail"></ul>
  </div>
</div>

<h2>지원 내역 <span class="small" id="cnt"></span></h2>
<div class="tbl-wrap">
  <table id="tbl">
    <thead><tr><th>학번</th><th>이름</th><th>#</th><th>대학</th><th>모집단위</th><th>구분</th><th>전형명</th><th>수험번호</th><th>6회제한</th><th>접수</th><th>면접일</th><th>발표일</th><th>충원발표</th><th>결과</th><th>메모</th><th>수정시각</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<h2>👤 학생별 요약 (지원 구성 점검)</h2>
<div class="tbl-wrap" style="max-height:400px;">
  <table id="tblStu">
    <thead><tr><th>학번</th><th>이름</th><th>6회 사용</th><th>예외 지원</th><th>교과</th><th>종합</th><th>논술</th><th>기타</th><th>접수완료</th><th>구성 점검</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<h2>💬 면접 기출·후기 관리</h2>
<div class="card">
  <div class="toolbar">
    <button class="gray" onclick="loadQ()">🔄 기출 불러오기</button>
    <input id="qFilter" placeholder="대학명/학과 검색" oninput="renderQ()" style="flex:1; min-width:140px;">
  </div>
  <div id="qList" style="margin-top:8px;"><p class="small">교사 키 입력 후 불러오면 작성자 학번과 함께 표시됩니다. 부적절한 글은 삭제하세요.</p></div>
</div>

<script>
// ★ 선생님: Apps Script 배포 후 받은 웹 앱 URL을 여기에 붙여넣으세요. (student.html과 동일 URL)
const API_URL = 'https://script.google.com/macros/s/AKfycbzkZDr8Q4gwDHcLqv3gDMbIrUBzPhYrQcNNlVnkVls4AEOxFhClTYXH-WBaaoPDGsAJ/exec';

// 열: 0수정시각 1학번 2이름 3지원번호 4대학 5학과 6전형구분 7전형명 8제한 9접수 10면접 11발표 12충원 13결과 14메모
let ROWS = [];
let calYM = null;
let selDate = null;

function showErr(t){ const m=document.getElementById('msg'); m.textContent=t; m.className='msg err'; }
function clearErr(){ document.getElementById('msg').className='msg'; }

async function load(){
  const key = document.getElementById('tkey').value.trim();
  if (!key) return showErr('교사 키를 입력하세요.');
  clearErr();
  try {
    const res = await fetch(`${API_URL}?action=list&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (!data.ok) return showErr(data.error);
    ROWS = data.rows;
    buildClassFilter();
    render();
  } catch (e) { showErr('불러오기 실패. API_URL 설정과 인터넷 연결을 확인하세요.'); }
}

function buildClassFilter(){
  const classes = [...new Set(ROWS.map(r => String(r[1]).slice(0,3)))].sort();
  const sel = document.getElementById('fClass');
  sel.innerHTML = '<option value="">전체 반</option>' + classes.map(c => `<option value="${c}">${parseInt(c.slice(0,1))}학년 ${parseInt(c.slice(1))}반</option>`).join('');
}

function typeKey(t){
  if (t.includes('교과')) return '교과';
  if (t.includes('종합')) return '종합';
  if (t.includes('논술')) return '논술';
  return '기타';
}

function filtered(){
  const fc = document.getElementById('fClass').value;
  const ft = document.getElementById('fType').value;
  const fl = document.getElementById('fLimit').value;
  const fr = document.getElementById('fResult').value;
  const fs = document.getElementById('fSearch').value.trim().toLowerCase();
  return ROWS.filter(r => {
    if (fc && String(r[1]).slice(0,3) !== fc) return false;
    if (ft && r[6] !== ft) return false;
    if (fl && r[8] !== fl) return false;
    if (fr === '__none__') { if (r[13]) return false; }
    else if (fr && r[13] !== fr) return false;
    if (fs && ![r[2],r[4],r[5],r[7]].some(x => String(x).toLowerCase().includes(fs))) return false;
    return true;
  });
}

function render(){
  const rows = filtered();
  // 통계
  const stuSet = new Set(rows.map(r => r[1]));
  const nPass = rows.filter(r => r[13].includes('합격') && !r[13].includes('불합격') && !r[13].includes('대기')).length;
  const nFail = rows.filter(r => r[13] === '불합격').length;
  const byType = {교과:0, 종합:0, 논술:0, 기타:0};
  let nExempt = 0;
  rows.forEach(r => { byType[typeKey(r[6])]++; if (r[8] === '예외') nExempt++; });
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${stuSet.size}</div><div class="lbl">입력 학생 수</div></div>
    <div class="stat"><div class="num">${rows.length}</div><div class="lbl">총 지원 건수</div></div>
    <div class="stat"><div class="num">${byType.교과}</div><div class="lbl">학생부교과</div></div>
    <div class="stat"><div class="num">${byType.종합}</div><div class="lbl">학생부종합</div></div>
    <div class="stat"><div class="num">${byType.논술 + byType.기타}</div><div class="lbl">논술·기타</div></div>
    <div class="stat"><div class="num">${nExempt}</div><div class="lbl">6회제한 예외 지원</div></div>
    <div class="stat"><div class="num">${nPass} / ${nFail}</div><div class="lbl">합격 / 불합격</div></div>`;

  // 메인 테이블
  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = rows.map(r => `
    <tr>
      <td>${r[1]}</td><td>${esc(r[2])}</td><td>${r[3]}</td><td>${esc(r[4])}</td><td>${esc(r[5])}</td>
      <td><span class="tag t-${typeKey(r[6])}">${esc(r[6])}</span></td>
      <td>${esc(r[7])}</td>
      <td>${esc(r[17] || '')}</td>
      <td>${r[8] === '예외' ? '<span class="tag t-예외">예외</span>' : '포함'}</td>
      <td>${r[9]}</td><td>${r[10]}</td><td>${r[11]}</td><td>${r[12]}</td>
      <td class="${r[13].includes('불합격')?'r-불합격':r[13].includes('충원합격')?'r-충원':r[13].includes('합격')?'r-합격':''}">${esc(r[13])}</td>
      <td>${esc(r[14])}</td><td class="small">${r[0]}</td>
    </tr>`).join('');
  document.getElementById('cnt').textContent = `(${rows.length}건)`;

  // 학생별 요약
  const stu = {};
  rows.forEach(r => {
    const k = r[1];
    if (!stu[k]) stu[k] = {name:r[2], limited:0, exempt:0, 교과:0, 종합:0, 논술:0, 기타:0, submitted:0, n:0};
    stu[k].n++;
    stu[k][typeKey(r[6])]++;
    if (r[8] === '예외') stu[k].exempt++; else stu[k].limited++;
    if (r[9] === 'O') stu[k].submitted++;
  });
  const warnDiv = [];
  document.querySelector('#tblStu tbody').innerHTML = Object.keys(stu).sort().map(k => {
    const s = stu[k];
    const checks = [];
    if (s.limited > 6) { checks.push('🚨 6회 초과!'); warnDiv.push(`${k} ${s.name}: 6회 제한 지원이 ${s.limited}건으로 표시됨 — 예외 표시 누락 또는 입력 오류 확인 필요`); }
    if (s.종합 >= 5) { checks.push('⚠ 종합 쏠림(불확실성↑)'); warnDiv.push(`${k} ${s.name}: 종합 ${s.종합}회 — 안전 지원 점검 필요`); }
    if (s.n >= 4 && s.교과 === 0) checks.push('⚠ 교과(안전) 카드 없음');
    if (s.limited < 6) checks.push(`${6 - s.limited}장 여유`);
    return `<tr><td>${k}</td><td>${esc(s.name)}</td><td>${s.limited}/6</td><td>${s.exempt}</td><td>${s.교과}</td><td>${s.종합}</td><td>${s.논술}</td><td>${s.기타}</td><td>${s.submitted}/${s.n}</td><td>${checks.join(' · ') || '✓'}</td></tr>`;
  }).join('');
  document.getElementById('warnings').innerHTML = warnDiv.map(w => `<div class="warn">${esc(w)}</div>`).join('');

  renderCal();
}

/* ---------- 반 전체 캘린더 ---------- */
function allEvents(){
  const evs = [];
  filtered().forEach(r => {
    const who = `${r[1]} ${r[2]}`;
    const what = `${r[4]} ${r[5]}`;
    const track = r[7];
    [[r[10],'면접'],[r[11],'발표'],[r[12],'충원']].forEach(([d, kind]) => {
      const ds = toISO(d);
      if (ds) evs.push({date: ds, kind, who, what, track, name: r[2], examno: r[17] || ''});
    });
  });
  return evs;
}

function moveMonth(d){
  calYM[1] += d;
  if (calYM[1] < 0) { calYM[1] = 11; calYM[0]--; }
  if (calYM[1] > 11) { calYM[1] = 0; calYM[0]++; }
  selDate = null;
  renderCal();
}

function renderCal(){
  if (!calYM) { const t = new Date(); calYM = [t.getFullYear(), t.getMonth()]; }
  const [y, m] = calYM;
  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;
  const evs = allEvents();
  const byDate = {};
  evs.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });

  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  let html = ['일','월','화','수','목','금','토'].map(d => `<div class="dow">${d}</div>`).join('');
  for (let i = 0; i < startDow; i++) html += `<div class="day out"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const list = byDate[ds] || [];
    const counts = {};
    list.forEach(e => { counts[e.kind] = (counts[e.kind] || 0) + 1; });
    const shown = ['면접','발표','충원'].filter(k => counts[k]).map(k => `<div class="ev ${k}">${k} ${counts[k]}</div>`).join('');
    const cls = ['day', ds === todayStr ? 'today' : '', ds === selDate ? 'sel' : ''].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="selectDay('${ds}')"><span class="dnum">${d}</span>${shown}</div>`;
  }
  document.getElementById('cal').innerHTML = html;
  renderDayDetail(byDate);
}

function selectDay(ds){
  selDate = ds;
  renderCal();
}

function closeModal(ev){
  if (ev && ev.target !== document.getElementById('modalBg')) return; // 팝업 내부 클릭은 무시
  selDate = null;
  document.getElementById('modalBg').classList.remove('open');
  renderCal();
}

function renderDayDetail(byDate){
  const bg = document.getElementById('modalBg');
  const list = (selDate && byDate[selDate]) || [];
  if (!selDate || !list.length) { bg.classList.remove('open'); return; }
  bg.classList.add('open');
  document.getElementById('dayDetailTitle').textContent = `${selDate} 일정 (${list.length}건)`;
  const order = {면접: 0, 발표: 1, 충원: 2};
  list.sort((a,b) => (order[a.kind] - order[b.kind]) || a.who.localeCompare(b.who));
  document.getElementById('dayDetail').innerHTML =
    list.map(e => `<li><span class="ev ${e.kind}">${e.kind}</span> <b>${esc(e.who)}</b> — ${esc(e.what)} (${esc(e.track)})${e.examno ? ' · 수험번호 <b>' + esc(e.examno) + '</b>' : ''}</li>`).join('');
}

function toISO(s){
  if (!s) return '';
  s = String(s).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return '';
}

function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- 면접 기출 관리 ---------- */
let Q_ROWS = []; // [시각, 대학, 학과, 전형명, 내용, 작성자학번, id]
async function loadQ(){
  const key = document.getElementById('tkey').value.trim();
  if (!key) return showErr('교사 키를 입력하세요.');
  clearErr();
  try {
    const res = await fetch(`${API_URL}?action=qlist&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (!data.ok) return showErr(data.error);
    Q_ROWS = data.rows;
    renderQ();
  } catch(e){ showErr('기출 불러오기 실패. 인터넷 연결을 확인하세요.'); }
}
function renderQ(){
  const f = document.getElementById('qFilter').value.trim();
  const rows = Q_ROWS.filter(r => !f || String(r[1]).includes(f) || String(r[2]).includes(f));
  document.getElementById('qList').innerHTML = rows.length ? rows.map(r => `
    <div class="q-item">
      <div class="small">🏫 <b>${esc(r[1])}</b> ${esc(r[2])} · ${esc(r[3])} · ${esc(r[0])} · 작성자 ${esc(r[5])}
        <button class="gray" style="padding:2px 8px; font-size:.75rem; margin-left:6px;" onclick="delQ('${r[6]}')">삭제</button></div>
      <div style="font-size:.88rem; white-space:pre-wrap;">${esc(r[4])}</div>
    </div>`).join('') : '<p class="small">등록된 기출·후기가 없습니다.</p>';
}
async function delQ(id){
  if (!confirm('이 글을 삭제할까요? 되돌릴 수 없습니다.')) return;
  const key = document.getElementById('tkey').value.trim();
  try {
    const res = await fetch(`${API_URL}?action=qdel&key=${encodeURIComponent(key)}&id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (!data.ok) return showErr(data.error);
    Q_ROWS = Q_ROWS.filter(r => r[6] !== id);
    renderQ();
  } catch(e){ showErr('삭제 실패. 인터넷 연결을 확인하세요.'); }
}

function exportCSV(){
  if (!ROWS.length) return showErr('먼저 현황을 불러오세요.');
  const header = ['수정시각','학번','이름','지원번호','대학명','모집단위','전형구분','전형명','6회제한','접수완료','면접일','발표일','충원발표일','결과','메모','체크리스트','최저기준','수험번호'];
  const lines = [header].concat(filtered()).map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','));
  const blob = new Blob(['﻿' + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `수시지원현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
